<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>카탄 주사위 롤러</title>
</head>
<body>
    <h1>카탄 주사위</h1>
    <div id="results">
        <p>빨간 주사위: <span id="red-dice">-</span></p>
        <p>노란 주사위: <span id="yellow-dice">-</span></p>
        <p>합계: <span id="total">-</span></p>
        <p>특수 주사위: <span id="special-dice">-</span></p>
    </div>
    <button onclick="rollCatanDice()">주사위 굴리기</button>
    <script src="script.js"></script>
    <div class="dice-card">
    <h1>카탄 주사위</h1>
    <p>빨간 주사위: <span id="red-dice" class="dice-value red">-</span></p>
    <p>노란 주사위: <span id="yellow-dice" class="dice-value yellow">-</span></p>
    <p>합계: <span id="total" class="dice-value">-</span></p>
    <hr>
    <p>특수 주사위: <strong id="special-dice">-</strong></p>
    <button onclick="rollCatanDice()">굴리기!</button>
</div>
</body>
</html>
